version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    container_name: backend
    restart: unless-stopped
    environment:
      - DATABASE=mongodb://mongodb:27017
      - JWT_SECRET=jwtsecret
      - NODE_ENV=production
      - OPENSSL_CONF=/dev/null
      - PUBLIC_SERVER_FILE=http://backend:8888/
    depends_on:
      # - mongodb
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8080 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build: ./frontend
    container_name: frontend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    ports:
      - "3000:80"
    depends_on:
      # - backend
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:3000/login || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5